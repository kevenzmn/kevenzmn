<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Documentos</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            width: 80%;
            max-width: 900px;
            text-align: center;
        }

        .button-group {
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-docx {
            background-color: #2b579a; /* Cor padrão do Word */
        }

        .btn-docx:hover {
            background-color: #1e3e6d;
        }

        .viewer-container {
            width: 100%;
            height: 80vh;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            background: #fff;
        }

        embed {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="button-group">
            <a href="images/laudo_maio.pdf" download class="btn">
                Baixar PDF
            </a>
            <a href="images/laudo_maio.docx" download class="btn btn-docx">
                Baixar DOCX
            </a>
        </div>

        <div class="viewer-container">
            <embed src="images/laudo_maio.pdf" type="application/pdf">
        </div>
    </div>

</body>
</html>
